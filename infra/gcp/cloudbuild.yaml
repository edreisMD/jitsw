# Cloud Build pipeline for the JITSW API.
#
# Trigger this from GitHub on push to main:
#   gcloud builds triggers create github \
#     --name=jitsw-api \
#     --repo-name=jitsw --repo-owner=<you> \
#     --branch-pattern=^main$ \
#     --build-config=infra/gcp/cloudbuild.yaml
#
# Or run manually:
#   gcloud builds submit --config infra/gcp/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_SERVICE=jitsw-api,_CLOUDSQL=<project>:<region>:<instance>
#
# Substitutions (all optional, sensible defaults):
#   _REGION          GCP region for the deployment (default us-central1)
#   _SERVICE         Cloud Run service name (default jitsw-api)
#   _IMAGE_REPO      Artifact Registry repo (default jitsw)
#   _CLOUDSQL        Cloud SQL connection name (default ""; no connector mounted)
#   _SECRETS_DB_URL  Secret Manager secret name holding DATABASE_URL

substitutions:
  _REGION: 'us-central1'
  _SERVICE: 'jitsw-api'
  _IMAGE_REPO: 'jitsw'
  _CLOUDSQL: ''
  _SECRETS_DB_URL: 'jitsw-database-url'

steps:
  # 1. Build the image.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - infra/gcp/Dockerfile.api
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/api:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/api:latest
      - .

  # 2. Push to Artifact Registry.
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/api']

  # 3. Run migrations against Cloud SQL before rolling out new revision.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        if [ -z "${_CLOUDSQL}" ]; then
          echo "No Cloud SQL connector configured; skipping migrate step."
          exit 0
        fi
        gcloud run jobs deploy jitsw-migrate \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/api:$SHORT_SHA \
          --region=${_REGION} \
          --add-cloudsql-instances=${_CLOUDSQL} \
          --set-secrets=DATABASE_URL=${_SECRETS_DB_URL}:latest \
          --command=node \
          --args=apps/api/dist/store/migrate.js \
          --max-retries=1 \
          --quiet || true
        gcloud run jobs execute jitsw-migrate --region=${_REGION} --wait

  # 4. Deploy to Cloud Run.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        EXTRA_ARGS=""
        if [ -n "${_CLOUDSQL}" ]; then
          EXTRA_ARGS="--add-cloudsql-instances=${_CLOUDSQL} --set-secrets=DATABASE_URL=${_SECRETS_DB_URL}:latest"
        fi
        gcloud run deploy ${_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/api:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8787 \
          --memory=512Mi \
          --cpu=1 \
          --concurrency=80 \
          --timeout=3600 \
          --set-env-vars=AUTH_MODE=firebase \
          $EXTRA_ARGS

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/api:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_IMAGE_REPO}/api:latest'
